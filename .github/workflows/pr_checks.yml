name: PR Checks

# Corre en cada PR hacia develop o main
# Más ligero que el pipeline completo: solo lint y tests rápidos
on:
  pull_request:
    branches: [develop, main]

jobs:
  lint-and-test:
    name: Lint + Tests rápidos
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: cafetrace_test
          MYSQL_USER: cafetrace_test
          MYSQL_PASSWORD: test_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Lint con ruff
        run: |
          pip install ruff
          ruff check . --output-format=github
        continue-on-error: true  # No bloquea el PR por lint, solo advierte

      - name: Ejecutar migraciones
        env:
          DATABASE_URL: mysql+pymysql://cafetrace_test:test_password@127.0.0.1:3306/cafetrace_test
        run: alembic upgrade head

      - name: Tests
        env:
          DATABASE_URL: mysql+pymysql://cafetrace_test:test_password@127.0.0.1:3306/cafetrace_test
          SECRET_KEY: test-secret-key-ci
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 60
        run: pytest tests/ -v --tb=short
