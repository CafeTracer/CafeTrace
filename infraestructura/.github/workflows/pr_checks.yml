name: PR Checks

# Corre en cada PR hacia develop o main
# Más ligero que el pipeline completo: solo lint y tests rápidos
on:
  pull_request:
    branches: [develop, main]

jobs:
  lint-and-test:
    name: Lint + Tests rápidos
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: cafetrace_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: cafetrace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Lint con ruff
        run: |
          pip install ruff
          ruff check . --output-format=github
        continue-on-error: true  # No bloquea el PR por lint, solo advierte

      - name: Ejecutar migraciones
        env:
          DATABASE_URL: postgresql://cafetrace_test:test_password@localhost:5432/cafetrace_test
        run: alembic upgrade head

      - name: Tests
        env:
          DATABASE_URL: postgresql://cafetrace_test:test_password@localhost:5432/cafetrace_test
          SECRET_KEY: test-secret-key-ci
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 60
        run: pytest tests/ -v --tb=short
