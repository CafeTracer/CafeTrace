name: CafeTrace CI/CD Pipeline

# Dispara en push a main (deploy completo) y en PRs hacia main o develop (solo tests)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

# Evita deploys concurrentes: si llega un push mientras uno corre, cancela el anterior
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1: TEST — corre en todos los eventos (push y PR)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  test:
    name: Tests del backend
    runs-on: ubuntu-latest

    # Levanta PostgreSQL como servicio para los tests de integración
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: cafetrace_test
          MYSQL_USER: cafetrace_test
          MYSQL_PASSWORD: test_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar migraciones en BD de test
        env:
          DATABASE_URL: mysql+pymysql://cafetrace_test:test_password@127.0.0.1:3306/cafetrace_test
        run: alembic upgrade head

      - name: Ejecutar tests con cobertura
        env:
          DATABASE_URL: mysql+pymysql://cafetrace_test:test_password@127.0.0.1:3306/cafetrace_test
          SECRET_KEY: test-secret-key-only-for-ci
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 60
        run: |
          pytest tests/ \
            --cov=routers \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70 \
            -v

      - name: Publicar reporte de cobertura
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2: BUILD — solo en push a main, depende de que test pase
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build y push imagen Docker
    runs-on: ubuntu-latest
    needs: test
    # Solo corre cuando el push es a main (no en PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extraer metadata para la imagen
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "version=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Imagen: ${{ steps.login-ecr.outputs.registry }}/cafetrace/backend:${SHORT_SHA}"

      - name: Build y push imagen Docker
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SHA_TAG: ${{ steps.meta.outputs.version }}
        run: |
          docker build \
            -t $REGISTRY/cafetrace/backend:$SHA_TAG \
            -t $REGISTRY/cafetrace/backend:latest \
            ./backend

          docker push $REGISTRY/cafetrace/backend:$SHA_TAG
          docker push $REGISTRY/cafetrace/backend:latest

          echo "✅ Imagen publicada: $REGISTRY/cafetrace/backend:$SHA_TAG"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3: DEPLOY — solo en push a main, depende de que build pase
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy a EC2
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy en EC2 vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            set -e

            echo "📦 Actualizando imagen..."
            aws ecr get-login-password --region us-east-1 | \
              docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}

            cd ~/cafetrace

            # Actualizar imagen sin recrear contenedores de BD ni monitoreo
            docker compose -f docker-compose.prod.yml pull api
            docker compose -f docker-compose.prod.yml up -d --no-deps api

            echo "⏳ Esperando que el servicio levante..."
            sleep 8

            # Health check: verifica que el backend responde
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)
            if [ "$HTTP_CODE" != "200" ]; then
              echo "❌ Health check falló (HTTP $HTTP_CODE). Haciendo rollback..."
              docker compose -f docker-compose.prod.yml pull api --image ${{ steps.login-ecr.outputs.registry }}/cafetrace/backend:previous || true
              docker compose -f docker-compose.prod.yml up -d --no-deps api
              exit 1
            fi

            echo "✅ Deploy exitoso. Backend responde en HTTP $HTTP_CODE"
            docker compose -f docker-compose.prod.yml ps

      - name: Notificar resultado en el PR/commit
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deploy completado exitosamente en EC2"
          else
            echo "❌ Deploy falló. Revisar logs."
          fi
