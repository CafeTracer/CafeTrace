events {
    worker_connections 1024;
}

http {
    # Configuración base
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Redirigir HTTP → HTTPS
    server {
        listen 80;
        server_name _;

        # Ruta para renovación de certificados Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS principal
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/letsencrypt/live/cafetrace/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cafetrace/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # ── Backend API ──────────────────────────────────────────────────────
        location / {
            proxy_pass         http://api:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Documentación Swagger (solo en desarrollo, comentar en producción final) ──
        location /docs {
            proxy_pass http://api:8000/docs;
        }
        location /openapi.json {
            proxy_pass http://api:8000/openapi.json;
        }

        # ── Grafana (acceso restringido al equipo) ───────────────────────────
        location /grafana/ {
            proxy_pass         http://grafana:3000/;
            proxy_set_header   Host $host;
            # Descomentar para proteger Grafana con contraseña HTTP básica adicional:
            # auth_basic           "CaféTrace Monitoring";
            # auth_basic_user_file /etc/nginx/.htpasswd;
        }
    }
}
